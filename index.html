<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contin's Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <i class="fas fa-blog"></i>
        <span>Contin's Blog</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="active">首页</a>
        <a href="archives.html">归档</a>
        <a href="tags.html">标签</a>
        <a href="links.html">友链</a>
      </div>
      <div class="nav-actions">
        <a href="#" class="nav-icon" title="RSS"><i class="fas fa-rss"></i></a>
        <a href="#" class="nav-icon search-toggle" title="搜索"><i class="fas fa-search"></i></a>
        <a href="#" class="nav-icon theme-toggle" title="切换主题"><i class="fas fa-moon"></i></a>
      </div>
    </div>
  </nav>

  <!-- 搜索弹窗 -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-modal">
      <div class="search-header">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜索文章..." autocomplete="off">
        <button class="search-close" id="searchClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <!-- 主内容区 -->
  <main class="main-container">
    <!-- 左侧边栏 -->
    <aside class="sidebar sidebar-left">
      <!-- 个人信息卡片 -->
      <div class="card profile-card">
        <div class="profile-avatar">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Contin" alt="avatar">
        </div>
        <h2 class="profile-name">Contin</h2>
        <p class="profile-bio">热爱技术，记录生活中的点滴思考</p>
        <div class="profile-stats">
          <div class="stat-item">
            <span class="stat-value">68</span>
            <span class="stat-label">文章</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">5</span>
            <span class="stat-label">分类</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">42</span>
            <span class="stat-label">标签</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">12.8</span>
            <span class="stat-label">万字</span>
          </div>
        </div>
      </div>

      <!-- 分类卡片 -->
      <div class="card category-card">
        <h3 class="card-title">分类</h3>
        <ul class="category-list">
          <!-- 由 JS 动态渲染 -->
        </ul>
      </div>

      <!-- 热门标签 -->
      <div class="card tags-card">
        <h3 class="card-title">热门标签</h3>
        <div class="tags-list">
          <!-- 由 JS 动态渲染 -->
        </div>
      </div>
    </aside>

    <!-- 中间文章列表 -->
    <section class="content-area">
      <div class="post-list" id="postList">
        <!-- 文章由JS动态渲染 -->
      </div>
    </section>

    <!-- 右侧边栏 -->
    <aside class="sidebar sidebar-right">
      <!-- 最近文章 -->
      <div class="card recent-card">
        <h3 class="card-title">最近文章</h3>
        <ul class="recent-list" id="recentList">
          <!-- JS动态渲染 -->
        </ul>
      </div>

      <!-- 日期归档 -->
      <div class="card archive-card">
        <h3 class="card-title">日期</h3>
        <ul class="archive-list" id="archiveList">
          <!-- JS动态渲染 -->
        </ul>
      </div>
    </aside>
  </main>

  <!-- 回到顶部 -->
  <button class="back-to-top" id="backToTop" title="回到顶部">
    <i class="fas fa-chevron-up"></i>
  </button>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Contin's Blog. Powered with <i class="fas fa-heart" style="color:#e74c3c"></i> and curiosity.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
