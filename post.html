<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 - Contin's Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="img/AvatarIcon.jpg" alt="logo" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">
        <span>Contin's Blog</span>
      </a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="archives.html">归档</a>
        <a href="tags.html">标签</a>
      </div>
      <div class="nav-actions">
        <a href="#" class="nav-icon search-toggle" title="搜索"><i class="fas fa-search"></i></a>
        <a href="#" class="nav-icon theme-toggle" title="切换主题"><i class="fas fa-moon"></i></a>
      </div>
    </div>
  </nav>

  <!-- 搜索弹窗 -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-modal">
      <div class="search-header">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜索文章..." autocomplete="off">
        <button class="search-close" id="searchClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <!-- 文章内容 -->
  <div class="article-container">
    <article class="article-card">
      <div class="article-hero" id="articleHero"></div>
      <div class="article-content">
        <div class="post-meta" id="articleMeta"></div>
        <h1 id="articleTitle"></h1>
        <div class="article-text" id="articleText"></div>
        <div class="article-tags" id="articleTags"></div>
      </div>
    </article>

    <!-- 上下篇导航 -->
    <div class="article-nav" id="articleNav"></div>
  </div>

  <!-- 回到顶部 -->
  <button class="back-to-top" id="backToTop" title="回到顶部">
    <i class="fas fa-chevron-up"></i>
  </button>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Contin's Blog. Powered with <i class="fas fa-heart" style="color:#e74c3c"></i> and curiosity.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
